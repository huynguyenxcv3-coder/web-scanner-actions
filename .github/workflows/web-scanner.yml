name: Web Scanner

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to scan'
        required: true
        type: string
      jobId:
        description: 'Job ID for callback'
        required: true
        type: string
      callbackUrl:
        description: 'Callback base URL'
        required: true
        type: string
      openaiApiKey:
        description: 'OpenAI API key (optional)'
        required: false
        type: string
        default: ''
      geminiApiKey:
        description: 'Gemini API key (optional)'
        required: false
        type: string
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer openai @google/generative-ai

      - name: Run scan
        env:
          JOB_ID: ${{ inputs.jobId }}
          TARGET_URL: ${{ inputs.url }}
          CALLBACK_URL: ${{ inputs.callbackUrl }}
          OPENAI_API_KEY: ${{ inputs.openaiApiKey }}
          GEMINI_API_KEY: ${{ inputs.geminiApiKey }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
        run: node scripts/scan.mjs
