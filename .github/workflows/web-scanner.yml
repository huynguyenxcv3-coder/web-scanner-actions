name: Web Scanner

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to scan'
        required: true
        type: string
      jobId:
        description: 'Job ID for callback'
        required: true
        type: string
      callbackUrl:
        description: 'Callback base URL (e.g. https://your-app.replit.dev/api/callback)'
        required: true
        type: string
      aiProvider:
        description: 'AI provider: openai or gemini'
        required: true
        type: string
        default: 'openai'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer openai @google/generative-ai

      - name: Run scan
        env:
          JOB_ID: ${{ inputs.jobId }}
          TARGET_URL: ${{ inputs.url }}
          CALLBACK_URL: ${{ inputs.callbackUrl }}
          AI_PROVIDER: ${{ inputs.aiProvider }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
        run: node scripts/scan.mjs
